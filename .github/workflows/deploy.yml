name: Deploy VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/obras-controle
            git pull
            npm install
            npm run build
            cp -r dist/* /var/www/obras-html/
            systemctl reload nginx
            echo "Deploy ObrasControle concluído!"
